name: Daily Hyderabad Event Alert

on:
  schedule:
    - cron: '10 1 * * *' # 6:40 AM IST
  workflow_dispatch: 

jobs:
  gather-and-email:
    runs-on: ubuntu-latest

    steps:
    - name: Fetch and Format Local Events
      run: |
        npm init -y
        npm install rss-parser

        cat << 'EOF' > generate-report.js
        const fs = require('fs');
        const Parser = require('rss-parser');
        const parser = new Parser();

        async function fetchDailyEvents() {
          const events = [];
          const uniqueTitles = new Set();
          
          // Strategy shift: Target the index footprints of premium real estate event directories directly
          const queries = [
            { q: 'site:realestateindia.ai "Hyderabad" OR "Expos" OR "Conferences"', cat: 'REAL ESTATE' },
            { q: 'site:allevents.in/hyderabad "Real Estate" OR "Property Show" OR "CREDAI"', cat: 'REAL ESTATE' },
            { q: 'Hyderabad "HITEX" OR "HICC" property OR expo OR "realty summit"', cat: 'REAL ESTATE' },
            { q: 'Hyderabad "AI" OR "Artificial Intelligence" OR "Tech Conclave" expo OR conference', cat: 'AI & TECH' }
          ];

          for (const query of queries) {
            try {
              const url = `https://news.google.com/rss/search?q=${encodeURIComponent(query.q)}&hl=en-IN&gl=IN&ceid=IN:en`;
              const feed = await parser.parseURL(url);

              for (const item of feed.items) {
                if (!item.title || uniqueTitles.has(item.title.toLowerCase())) continue;
                
                let cleanTitle = item.title.split(' - ')[0].trim();
                
                // Clean up trailing platform noise from the titles
                cleanTitle = cleanTitle.replace(/\|.*/g, '').trim();
                uniqueTitles.add(item.title.toLowerCase());

                let venue = 'Hyderabad Hubs / HITEX / HICC';
                const lowerTitle = cleanTitle.toLowerCase();
                if (lowerTitle.includes('hitex')) venue = 'HITEX Exhibition Centre';
                if (lowerTitle.includes('hicc') || lowerTitle.includes('novotel')) venue = 'HICC Novotel';
                
                let category = query.cat;
                if (lowerTitle.includes('property') || lowerTitle.includes('realty') || lowerTitle.includes('estate') || lowerTitle.includes('credai')) {
                  category = 'REAL ESTATE';
                }

                const pubDate = item.pubDate ? new Date(item.pubDate) : new Date();

                events.push({ 
                  title: cleanTitle, 
                  venue, 
                  date: pubDate.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' }), 
                  link: item.link || '', 
                  category
                });
              }
            } catch (err) {
              console.error(`Directory fetch skipped: ${err.message}`);
            }
          }

          // Return compiled array of clean matches
          return events.slice(0, 12);
        }

        async function run() {
          const events = await fetchDailyEvents();
          const todayStr = new Date().toLocaleDateString('en-IN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

          let html = `<div style="font-family: Arial, sans-serif; max-width: 600px; color: #333; line-height: 1.6;">`;
          html += `<h2 style="color: #1a73e8; border-bottom: 2px solid #1a73e8; padding-bottom: 8px; margin-bottom: 20px;">🚨 Hyderabad Events Digest</h2>`;
          html += `<p style="color: #666; font-size: 14px;">📅 <strong>System Dispatch Date:</strong> ${todayStr}</p><br/>`;

          if (events.length > 0) {
            html += `<h3 style="color: #1a73e8; border-left: 4px solid #1a73e8; padding-left: 8px; margin-top: 20px;">🔥 ACTIVE TRACKED B2B UPDATES:</h3><ul style="padding-left: 20px;">`;
            events.forEach(e => {
              html += `<li style="margin-bottom: 16px;"><strong>[${e.category}]</strong> <span style="font-size: 15px; color: #111; font-weight: bold;">${e.title}</span><br/>📍 <em>Venue:</em> ${e.venue} <span style="color: #777; font-size: 12px;">(Tracked: ${e.date})</span><br/>🔗 <a href="${e.link}" style="color: #1a73e8; text-decoration: none; font-weight: bold;">View Details &rarr;</a></li>`;
            });
            html += `</ul>`;
          } else {
            html += `<div style="background-color: #f8f9fa; padding: 12px; border-radius: 4px; border-left: 4px solid #777; font-style: italic; color: #555; margin-bottom: 20px;">⚠️ No structural real estate or tech directory logs found.</div>`;
          }

          html += `<hr style="border: 0; border-top: 1px solid #eee; margin-top: 40px;"/>`;
          html += `<p style="font-size: 11px; color: #999; font-style: italic; text-align: center;">Automated structural index developer dispatch.</p></div>`;

          fs.writeFileSync('digest.html', html);
        }

        run();
        EOF

        node generate-report.js

    - name: Dispatch Email to Founder
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        secure: true
        username: ${{ secrets.SENDER_EMAIL }}
        password: ${{ secrets.GMAIL_APP_PASSWORD }}
        subject: 🚨 Hyderabad Daily Events Alert
        to: ${{ secrets.FOUNDER_EMAIL }}
        from: Hyderabad Event Bot <noreply@github.com>
        html_body: file://digest.html
